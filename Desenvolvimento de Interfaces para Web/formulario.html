<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Contato Profissional</title>
</head>
<body>
    <form action="recebedados.php" method="post">
        <fieldset>
            <legend>Dados Pessoais</legend>
            
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required autofocus><br><br>
            
            <label>Gênero:</label><br>
            <input type="radio" id="feminino" name="genero" value="Feminino">
            <label for="feminino">Feminino</label>
            
            <input type="radio" id="masculino" name="genero" value="Masculino">
            <label for="masculino">Masculino</label>
            
            <input type="radio" id="outro" name="genero" value="Outro">
            <label for="outro">Outro</label>
            
            <input type="radio" id="naoresponder" name="genero" value="Prefiro não responder">
            <label for="naoresponder">Prefiro não responder</label><br><br>
            
            <label for="nascimento">Data de nascimento:</label>
            <input type="date" id="nascimento" name="nascimento"><br><br>
            
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required><br><br>

            <label for="URL-site-pessoal">URL site pessoal</label>
            <input type="url" id="URL-site-pessoal" name="URL-site-pessoal" required><br><br>


            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" name="endereco" placeholder="Rua, número e complemento" required><br><br>
            
            <label for="cidade">Cidade:</label>
            <select id="cidade" name="cidade">
                <option value="Alvorada">Alvorada</option>
                <option value="Canoas">Canoas</option>
                <option value="Esteio">Esteio</option>
                <option value="Gravataí">Gravataí</option>
                <option value="Novo Hamburgo">Novo Hamburgo</option>
                <option value="Passo Fundo">Passo Fundo</option>
                <option value="Pelotas">Pelotas</option>
                <option value="Porto Alegre">Porto Alegre</option>
                <option value="São Leopoldo">São Leopoldo</option>
            </select><br><br>
            
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone"><br><br>
        </fieldset>
        
        <fieldset>
            <legend>Dados Profissionais</legend>
            
            <label for="areas">Áreas de atuação:</label><br>
            <select id="areas" name="areas[]" multiple>
                <option value="Design">Design</option>
                <option value="Desenvolvimento Front-end">Desenvolvimento Front-end</option>
                <option value="Desenvolvimento Back-end">Desenvolvimento Back-end</option>
                <option value="Engenharia de Software">Engenharia de Software</option>
                <option value="Banco de Dados">Banco de Dados</option>
                <option value="Análise de Testes">Análise de Testes</option>
                <option value="Análise de Negócios">Análise de Negócios</option>
                <option value="Manutenção">Manutenção</option>
            </select><br><br>
            
            <label for="formacao">Formação:</label>
            <input list="formacoes" id="formacao" name="formacao">
            <datalist id="formacoes">
                <option value="Ensino Fundamental">
                <option value="Ensino Médio">
                <option value="Ensino Superior">
                <option value="Especialização">
                <option value="Mestrado">
                <option value="Doutorado">
            </datalist><br><br>
            
            <label for="historico">Breve histórico profissional:</label><br>
            <textarea id="historico" name="historico" rows="5" cols="40"></textarea><br><br>
            
            <label for="curriculo">Upload do currículo vitae:</label>
            <input type="file" id="curriculo" name="curriculo"><br><br>
            
            <label for="horas">Disponibilidade de horas semanais:</label>
            <select id="horas" name="horas" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="40">40</option>
            </select><br><br>
        </fieldset>

        <fieldset>
            <legend>Agendamento de entrevista</legend>
            
            <label for="data_entrevista">Data:</label>
            <input type="date" id="data_entrevista" name="data_entrevista" required><br><br>
            
            <label for="hora_entrevista">Horário:</label>
            <input type="time" id="hora_entrevista" name="hora_entrevista" required><br><br>
        </fieldset>
        
        <br>
        <button type="submit">Enviar Cadastro</button>
    </form>
</body>
</html>
